<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mission Hub - Map</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app-container">
        <!-- 4. MISSION MAP PAGE -->
        <div id="screen-map" class="screen active layout-app">
            <aside class="sidebar">
                <div class="sidebar-logo">EMH</div>
                <nav class="sidebar-nav">
                    <button class="nav-item" onclick="navigateTo('dashboard.html')"><i class="fa-solid fa-house"></i>
                        <span>Dashboard</span></button>
                    <button class="nav-item active" onclick="navigateTo('map.html')"><i
                            class="fa-solid fa-map-location-dot"></i> <span>Missions Map</span></button>
                    <button class="nav-item" onclick="navigateTo('daily_challenge.html')"><i
                            class="fa-solid fa-bolt"></i> <span>Daily Challenge</span></button>
                    <button class="nav-item" onclick="navigateTo('achievements.html')"><i class="fa-solid fa-medal"></i>
                        <span>Achievements</span></button>
                    <button class="nav-item" onclick="navigateTo('shop.html')"><i class="fa-solid fa-store"></i>
                        <span>Shop</span></button>

                </nav>
                <div class="sidebar-bottom">
                    <button class="nav-item" onclick="navigateTo('settings.html')"><i class="fa-solid fa-gear"></i>
                        <span>Settings</span></button>
                    <button class="nav-item text-danger" onclick="logout()"><i
                            class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></button>
                </div>
            </aside>
            <main class="main-content no-padding">
                <div class="map-container">
                    <header class="map-header glass-card">
                        <h2>City Map</h2>
                        <p>Select a location to find available missions.</p>
                    </header>

                    <div class="map-interactive" id="map-interactive">
                        <!-- Map Nodes (data-level determines unlock threshold) -->
                        <div class="map-node locked" data-level="1" style="top: 75%; left: 20%;"
                            onclick="handleMapNodeClick('coffee_shop', this)">
                            <div class="node-icon"><i class="fa-solid fa-mug-hot"></i></div>
                            <div class="node-label">Coffee Shop</div>
                        </div>
                        <div class="map-node locked" data-level="1" style="top: 20%; left: 30%;"
                            onclick="handleMapNodeClick('airport', this)">
                            <div class="node-icon"><i class="fa-solid fa-plane"></i></div>
                            <div class="node-label">Airport</div>
                        </div>
                        <div class="map-node locked" data-level="1" style="top: 50%; left: 45%;"
                            onclick="handleMapNodeClick('restaurant', this)">
                            <div class="node-icon"><i class="fa-solid fa-utensils"></i></div>
                            <div class="node-label">Restaurant</div>
                        </div>
                        <div class="map-node locked" data-level="2" style="top: 35%; left: 70%;"
                            onclick="handleMapNodeClick('office', this)">
                            <div class="node-icon"><i class="fa-solid fa-building"></i></div>
                            <div class="node-label">Office</div>
                        </div>
                        <div class="map-node locked" data-level="2" style="top: 60%; left: 80%;"
                            onclick="handleMapNodeClick('architect', this)">
                            <div class="node-icon"><i class="fa-solid fa-helmet-safety"></i></div>
                            <div class="node-label">Construction</div>
                        </div>
                        <div class="map-node locked" data-level="3" style="top: 10%; left: 60%;"
                            onclick="handleMapNodeClick('chemistry', this)">
                            <div class="node-icon"><i class="fa-solid fa-flask"></i></div>
                            <div class="node-label">University Lab</div>
                        </div>
                        <div class="map-node locked" data-level="2" style="top: 80%; left: 55%;"
                            onclick="handleMapNodeClick('courier', this)">
                            <div class="node-icon"><i class="fa-solid fa-truck-fast"></i></div>
                            <div class="node-label">Post Office</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- 5. MISSION DETAIL MODAL -->
        <div id="modal-mission-detail" class="modal-overlay">
            <div class="glass-card mission-detail-card">
                <button class="close-btn" onclick="closeModal('modal-mission-detail')"><i
                        class="fa-solid fa-xmark"></i></button>
                <div class="detail-header" id="md-header-bg">
                    <div class="detail-icon"><i class="fa-solid fa-plane" id="md-icon"></i></div>
                </div>
                <div class="detail-body">
                    <h2 id="md-title">Title</h2>
                    <p id="md-desc">Description</p>

                    <div class="detail-stats">
                        <div class="stat-item">
                            <i class="fa-solid fa-gauge-high"></i>
                            <div>
                                <small>Difficulty</small>
                                <strong id="md-diff">Beginner</strong>
                            </div>
                        </div>
                        <div class="stat-item">
                            <i class="fa-solid fa-star text-gold"></i>
                            <div>
                                <small>Reward</small>
                                <strong>+<span id="md-xp">100</span> XP</strong>
                            </div>
                        </div>
                        <div class="stat-item">
                            <i class="fa-solid fa-clock"></i>
                            <div>
                                <small>Time</small>
                                <strong id="md-time">3 Mins</strong>
                            </div>
                        </div>
                    </div>

                    <button class="btn-primary btn-full mt-4" onclick="startGameplay()">Start Mission</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
