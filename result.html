<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mission Hub - Result</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app-container">
        <!-- 7. RESULT PAGE -->
        <div id="screen-result" class="screen active layout-center">
            <div class="glass-card result-card">
                <div class="result-animation">
                    <i class="fa-solid fa-trophy fa-4x text-gold bounce"></i>
                </div>
                <h1 class="mt-3">Mission Accomplished!</h1>
                <p>Great job navigating that scenario.</p>

                <div class="reward-summary">
                    <div class="reward-item">
                        <span class="label">Score</span>
                        <span class="value" id="res-score">-</span>
                    </div>
                    <div class="reward-item">
                        <span class="label">XP Earned</span>
                        <span class="value text-gold">+<span id="res-xp">0</span> XP</span>
                    </div>
                    <div class="reward-item">
                        <span class="label">Accuracy</span>
                        <span class="value" id="res-accuracy">0%</span>
                    </div>
                </div>

                <div class="feedback-section">
                    <h3>Feedback</h3>
                    <div class="feedback-item success">
                        <i class="fa-solid fa-check-circle"></i> Excellent attempt! Keep practicing to improve your
                        vocabulary.
                    </div>
                </div>

                <div class="result-actions mt-4">
                    <button class="btn-secondary" onclick="navigateTo('map.html')">Back to Map</button>
                    <button class="btn-primary" onclick="navigateTo('dashboard.html')">Dashboard</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
